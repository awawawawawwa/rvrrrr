name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    name: Build ${{ matrix.platform.name }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          # Linux builds: all use ubuntu-latest + houseabsolute/actions-rust-cross
          - name: linux-x64-gnu
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - name: linux-x64-musl
            runner: ubuntu-latest
            target: x86_64-unknown-linux-musl
          - name: linux-arm64-gnu
            runner: ubuntu-latest
            target: aarch64-unknown-linux-gnu
          # macOS: native runners, no cross needed
          # Pitfall 3: macos-latest is now ARM (M1+) — use macos-13 for Intel
          - name: darwin-x64
            runner: macos-13
            target: x86_64-apple-darwin
          - name: darwin-arm64
            runner: macos-latest
            target: aarch64-apple-darwin
          # Windows: native runners
          - name: win32-x64-msvc
            runner: windows-latest
            target: x86_64-pc-windows-msvc
          # Note: aarch64-pc-windows-msvc cross-compiled from x64 host — no ARM Windows runner available
          - name: win32-arm64-msvc
            runner: windows-latest
            target: aarch64-pc-windows-msvc
    runs-on: ${{ matrix.platform.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Build binary
        uses: houseabsolute/actions-rust-cross@v1
        with:
          command: build
          target: ${{ matrix.platform.target }}
          args: "--locked --release"
          working-directory: crates/renderer

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.platform.name }}
          path: crates/renderer/target/${{ matrix.platform.target }}/release/rvrrrr-renderer*
          if-no-files-found: error

  publish-npm:
    name: Publish npm packages
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Download all binary artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Extract version from git tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Place binaries and publish platform packages
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          PLATFORMS=(
            linux-x64-gnu
            linux-x64-musl
            linux-arm64-gnu
            darwin-x64
            darwin-arm64
            win32-x64-msvc
            win32-arm64-msvc
          )

          for PLATFORM in "${PLATFORMS[@]}"; do
            PKG_DIR="npm/${PLATFORM}"
            ARTIFACT_DIR="artifacts/binary-${PLATFORM}"

            # Copy binary (handles both rvrrrr-renderer and rvrrrr-renderer.exe)
            cp "${ARTIFACT_DIR}"/rvrrrr-renderer* "${PKG_DIR}/"

            # Make executable on non-Windows platforms
            chmod +x "${PKG_DIR}/rvrrrr-renderer" 2>/dev/null || true

            # Set version in platform package.json
            node -e "
              const fs = require('fs');
              const p = JSON.parse(fs.readFileSync('${PKG_DIR}/package.json', 'utf8'));
              p.version = '${VERSION}';
              fs.writeFileSync('${PKG_DIR}/package.json', JSON.stringify(p, null, 2) + '\n');
            "

            # Publish platform package (MUST be before @rvrrrr/core — Pitfall 2)
            echo "Publishing @rvrrrr/renderer-${PLATFORM}@${VERSION}"
            npm publish "${PKG_DIR}" --access public
          done

      - name: Set version in root package.json
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          node -e "
            const fs = require('fs');
            const p = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            p.version = '${VERSION}';
            // Update optionalDependencies versions to match
            for (const key of Object.keys(p.optionalDependencies || {})) {
              p.optionalDependencies[key] = '${VERSION}';
            }
            fs.writeFileSync('package.json', JSON.stringify(p, null, 2) + '\n');
          "

      - name: Publish @rvrrrr/core
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-crate:
    name: Publish to crates.io
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Publish rvrrrr-renderer to crates.io
        working-directory: crates/renderer
        run: cargo publish --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
